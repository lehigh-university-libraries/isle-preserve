services:
  alpaca:
    environment:
      ALPACA_DERIVATIVE_FITS_URL: http://crayfits:8080
      ALPACA_DERIVATIVE_OCR_URL: http://hypercube:8080
      ALPACA_DERIVATIVE_HOMARUS_URL: http://homarus:8080
      ALPACA_DERIVATIVE_HOUDINI_URL: http://houdini:8080
      ALPACA_DERIVATIVE_LIBREOFFICE_URL: http://libreoffice:8080
      ALPACA_DERIVATIVE_WHISPER_URL: http://whisper:8080
      ALPACA_DERIVATIVE_OCRPDF_URL: http://ocrpdf:8080
      ALPACA_DERIVATIVE_HTR_URL: http://ocrpdf:8080
  drupal-cron:
    profiles: [none]
  rollout:
    profiles: [none]
  drupal-lehigh:
    profiles: [none]
  traefik:
    ports:
      - 8080:8080
  drupal:
    build:
      context: ./drupal
      x-bake:
        cache-from:
          - type=registry,ref=ghcr.io/lehigh-university-libraries/${COMPOSE_PROJECT_NAME}:local
          - type=registry,ref=ghcr.io/lehigh-university-libraries/${COMPOSE_PROJECT_NAME}:main
        cache-to:
          - type=inline
        platforms:
          - linux/arm64
    environment:
      URI_SCHEME: http
      DRUPAL_ENABLE_HTTPS: "false"
    secrets:
      - source: UID
    volumes:
      - drupal-public-files:/var/www/drupal/web/sites/default/files:rw
      - ./tmp/drupal-private-files:/var/www/drupal/private:rw
      - fcrepo-data:/fcrepo:rw
      - ./tmp/drupal:/tmp:rw
      - ./tmp/nginx:/var/lib/nginx/tmp:rw
      - ./tmp/nginx-cache:/var/cache/nginx:rw
      - ./drupal/rootfs/var/www/drupal:/var/www/drupal:z,rw,${CONSISTENCY}
  mariadb:
    ports:
      - 3306:3306
  memcached:
    command: memcached -m 256 -I 5m
  fits:
    image: islandora/fits:6.4.3@sha256:45c10116ffdd4efa92734dfe0c332ad805ebbf89bc1a36f4e4ffec865d72f6da
    volumes:
      - ./tmp/fits:/tmp:rw
  crayfits:
    image: islandora/crayfits:6.4.3@sha256:1d36178682e4d442525e667a6eaee736808cd5492b4ff4312639f72e94657f4c
    environment:
      JWKS_URI: https://${DOMAIN}/oauth/discovery/keys
    volumes:
      - ./tmp/crayfits:/tmp:rw
      - ./certs/rootCA.pem:/app/ca.pem:r
  hls:
    image: ghcr.io/lehigh-university-libraries/scyllaridae-hls:main@sha256:759c0447f398a6e2e0e53e94408793380aa0ba771fb24be224575e1b97320ffd
    environment:
      JWKS_URI: https://${DOMAIN}/oauth/discovery/keys
    secrets:
      - source: CERT_PUBLIC_KEY
      - source: CERT_AUTHORITY
      - source: JWT_PUBLIC_KEY
  homarus:
    image: islandora/homarus:6.4.3@sha256:daab99bff3a08613f3db1146e209faf31ee9a6c4d3f791c73fbfd409116679bc
    environment:
      JWKS_URI: https://${DOMAIN}/oauth/discovery/keys
    volumes:
      - ./tmp/homarus:/tmp:rw
      - ./certs/rootCA.pem:/app/ca.pem:r
  houdini:
    image: islandora/houdini:6.4.3@sha256:34406f7703e02ed164a9029afd884d1586f24b71b3a50a01a1e422cebf82085f
    environment:
      JWKS_URI: https://${DOMAIN}/oauth/discovery/keys
    volumes:
      - ./tmp/houdini:/tmp:rw
      - ./certs/rootCA.pem:/app/ca.pem:r
  hypercube:
    image: islandora/hypercube:6.4.3@sha256:bbcd803150ca2ce7420ecdad7a75f4bde8af9cde6072730b03305e742538913f
    environment:
      JWKS_URI: https://${DOMAIN}/oauth/discovery/keys
    volumes:
      - ./tmp/hypercube:/tmp:rw
      - ./certs/rootCA.pem:/app/ca.pem:r
  ocrpdf:
    image: ghcr.io/lehigh-university-libraries/scyllaridae-ocrpdf:main@sha256:5ace9ac69a6c8bf31f252bb8ed95a8600fc9be38a1990903f9cd348d0349a6cf
    environment:
      JWKS_URI: https://${DOMAIN}/oauth/discovery/keys
  libreoffice:
    image: ghcr.io/lehigh-university-libraries/scyllaridae-libreoffice:main@sha256:7855fd5f613e6c57dc0d1f1eafc2674e6c6811f31a600b8c7ec3c459a5faae38
    environment:
      JWKS_URI: https://${DOMAIN}/oauth/discovery/keys
    secrets:
      - source: CERT_PUBLIC_KEY
      - source: CERT_AUTHORITY
      - source: JWT_PUBLIC_KEY
  coverpage:
    image: ghcr.io/lehigh-university-libraries/scyllaridae-coverpage:main@sha256:006841e1c671391203ba9bd26541b7baf3f88cf390d3d853ee5dca360717f29f
    environment:
      JWKS_URI: https://${DOMAIN}/oauth/discovery/keys
    secrets:
      - source: CERT_PUBLIC_KEY
      - source: CERT_AUTHORITY
      - source: JWT_PUBLIC_KEY
  mergepdf:
    image: islandora/mergepdf:6.4.3@sha256:fcd7c2e81a67df773d5acbcbf6d307e1552f46722591ddeaf8f949b42ae2c97d
    environment:
      JWKS_URI: https://${DOMAIN}/oauth/discovery/keys
      MAX_THREADS: 3
    secrets:
      - source: CERT_PUBLIC_KEY
      - source: CERT_AUTHORITY
      - source: JWT_PUBLIC_KEY
  drupal-static:
    volumes:
      - ./tmp/drupal-private-files/canonical/${DOMAIN}/0:/usr/share/nginx/drupal:ro
      - ./tmp/drupal-private-files/iiif/${DOMAIN}/294de3557d9d00b3d2d8a1e6aab028cf:/usr/share/nginx/iiif:ro
      - drupal-public-files:/var/www/drupal/web/sites/default/files:ro
      - ./tmp/drupal-static:/tmp:rw
      - ./tmp/nginx-static:/var/lib/nginx/tmp:rw
      - ./tmp/nginx-static-cache:/var/cache/nginx:rw
      - ./tmp/drupal/web:/var/www/drupal/web:rw
  fcrepo:
    volumes:
      - fcrepo-data:/data:rw
      - ./tmp/fcrepo:/tmp:rw
  triplet:
    volumes:
      - drupal-public-files:/public:r
      - ./tmp/drupal-private-files:/private:r
      - fcrepo-data:/fcrepo:r
      - ./certs/rootCA.pem:/etc/ssl/certs/lehigh.pem:r
      - ./conf/triplet/config.yaml:/etc/triplet/config.yaml:r
      - ./tmp/triplet-cache:/var/lib/triplet/cache:rw
