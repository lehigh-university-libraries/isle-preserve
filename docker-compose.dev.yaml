services:
  alpaca:
    environment:
      ALPACA_DERIVATIVE_FITS_URL: http://crayfits:8080
      ALPACA_DERIVATIVE_OCR_URL: http://hypercube:8080
      ALPACA_DERIVATIVE_HOMARUS_URL: http://homarus:8080
      ALPACA_DERIVATIVE_HOUDINI_URL: http://houdini:8080
      ALPACA_DERIVATIVE_LIBREOFFICE_URL: http://libreoffice:8080
      ALPACA_DERIVATIVE_WHISPER_URL: http://whisper:8080
      ALPACA_DERIVATIVE_OCRPDF_URL: http://ocrpdf:8080
      ALPACA_DERIVATIVE_HTR_URL: http://ocrpdf:8080
  drupal-cron:
    profiles: [none]
  rollout:
    profiles: [none]
  drupal-lehigh:
    profiles: [none]
  cantaloupe:
    volumes:
      - cantaloupe-data:/data:Z,rw
      - ./tmp/cantaloupe:/tmp:rw
  traefik:
    ports:
      - 8080:8080
  drupal:
    build:
      context: ./drupal
      x-bake:
        cache-from:
          - type=registry,ref=ghcr.io/lehigh-university-libraries/${COMPOSE_PROJECT_NAME}:local
          - type=registry,ref=ghcr.io/lehigh-university-libraries/${COMPOSE_PROJECT_NAME}:main
        cache-to:
          - type=inline
        platforms:
          - linux/arm64
    environment:
      URI_SCHEME: http
      DRUPAL_ENABLE_HTTPS: "false"
    secrets:
      - source: UID
    volumes:
      - drupal-public-files:/var/www/drupal/web/sites/default/files:rw
      - ./tmp/drupal-private-files:/var/www/drupal/private:rw
      - fcrepo-data:/fcrepo:rw
      - ./tmp/drupal:/tmp:rw
      - ./tmp/nginx:/var/lib/nginx/tmp:rw
      - ./tmp/nginx-cache:/var/cache/nginx:rw
      - ./drupal/rootfs/var/www/drupal:/var/www/drupal:z,rw,${CONSISTENCY}
  mariadb:
    ports:
      - 3306:3306
  memcached:
    command: memcached -m 256 -I 5m
  fits:
    image: islandora/fits:6.3.19@sha256:a2bd3595c1504ab30846f64989a116f562b2ac4968cfa8018d3a86261124e496
    volumes:
      - ./tmp/fits:/tmp:rw
  crayfits:
    image: islandora/crayfits:6.3.19@sha256:77111e4b6d0152bf2fb0da8f60f2872d210a4e4440cc323badd46a1e59a669cb
    environment:
      JWKS_URI: https://${DOMAIN}/oauth/discovery/keys
    volumes:
      - ./tmp/crayfits:/tmp:rw
      - ./certs/rootCA.pem:/app/ca.pem:r
  hls:
    image: ghcr.io/lehigh-university-libraries/scyllaridae-hls:main@sha256:532cfdb944e837c33a56c53e61b1a8ab4f761a30ec43e283e21e725526a17275
    environment:
      JWKS_URI: https://${DOMAIN}/oauth/discovery/keys
    secrets:
      - source: CERT_PUBLIC_KEY
      - source: CERT_AUTHORITY
      - source: JWT_PUBLIC_KEY
  homarus:
    image: islandora/homarus:6.3.19@sha256:d3d1357b426bfd23653f27e2e86d6362e11907c8bb1f1673afb5fcb22f8bb8bb
    environment:
      JWKS_URI: https://${DOMAIN}/oauth/discovery/keys
    volumes:
      - ./tmp/homarus:/tmp:rw
      - ./certs/rootCA.pem:/app/ca.pem:r
  houdini:
    image: islandora/houdini:6.3.19@sha256:ef539ddafdc26fe10faf104b75aac549812897ca8a4332d2341e72944c8ec7bb
    environment:
      JWKS_URI: https://${DOMAIN}/oauth/discovery/keys
    volumes:
      - ./tmp/houdini:/tmp:rw
      - ./certs/rootCA.pem:/app/ca.pem:r
  hypercube:
    image: islandora/hypercube:6.3.19@sha256:3017c247e6b197fa9bed86eb5c622749452c545b1ca7a76ca4b11d48570380cf
    environment:
      JWKS_URI: https://${DOMAIN}/oauth/discovery/keys
    volumes:
      - ./tmp/hypercube:/tmp:rw
      - ./certs/rootCA.pem:/app/ca.pem:r
  ocrpdf:
    image: ghcr.io/lehigh-university-libraries/scyllaridae-ocrpdf:main@sha256:3ae2d68ef4eb5d351d7da9d052a0ad1d5b76ec69a34675e1888a01c758d3c97f
    environment:
      JWKS_URI: https://${DOMAIN}/oauth/discovery/keys
  libreoffice:
    image: ghcr.io/lehigh-university-libraries/scyllaridae-libreoffice:main@sha256:3c769b1fc091a153290c85ec6954c07caca595e61bbf0bef3b4a75c2bbe6f629
    environment:
      JWKS_URI: https://${DOMAIN}/oauth/discovery/keys
    secrets:
      - source: CERT_PUBLIC_KEY
      - source: CERT_AUTHORITY
      - source: JWT_PUBLIC_KEY
  coverpage:
    image: ghcr.io/lehigh-university-libraries/scyllaridae-coverpage:main@sha256:d4525a8aec217026f25ea570854268ef92f7ff0a6b073e3aadf60fac5a2b16e2
    environment:
      JWKS_URI: https://${DOMAIN}/oauth/discovery/keys
    secrets:
      - source: CERT_PUBLIC_KEY
      - source: CERT_AUTHORITY
      - source: JWT_PUBLIC_KEY
  mergepdf:
    image: islandora/mergepdf:6.3.19@sha256:69f391d2058463f815c87b6703a39e38f5e61bf27b15b305ebf4bda64268110c
    environment:
      JWKS_URI: https://${DOMAIN}/oauth/discovery/keys
      MAX_THREADS: 3
    secrets:
      - source: CERT_PUBLIC_KEY
      - source: CERT_AUTHORITY
      - source: JWT_PUBLIC_KEY
  drupal-static:
    volumes:
      - ./tmp/drupal-private-files/canonical/${DOMAIN}/0:/usr/share/nginx/drupal:ro
      - ./tmp/drupal-private-files/iiif/${DOMAIN}/294de3557d9d00b3d2d8a1e6aab028cf:/usr/share/nginx/iiif:ro
      - drupal-public-files:/var/www/drupal/web/sites/default/files:ro
      - ./tmp/drupal-static:/tmp:rw
      - ./tmp/nginx-static:/var/lib/nginx/tmp:rw
      - ./tmp/nginx-static-cache:/var/cache/nginx:rw
      - ./tmp/drupal/web:/var/www/drupal/web:rw
  fcrepo:
    volumes:
      - fcrepo-data:/data:rw
      - ./tmp/fcrepo:/tmp:rw
  triplet:
    volumes:
      - drupal-public-files:/public:r
      - ./tmp/drupal-private-files:/private:r
      - fcrepo-data:/fcrepo:r
      - ./certs/rootCA.pem:/etc/ssl/certs/lehigh.pem:r
      - ./conf/triplet/config.yaml:/etc/triplet/config.yaml:r
      - ./tmp/triplet-cache:/var/lib/triplet/cache:rw
