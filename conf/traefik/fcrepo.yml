http:
  middlewares:
    fcrepo-strip-suffix:
      replacePathRegex:
        regex: "^(.*/fcrepo/rest/[^.]*)/fcr:metadata$"
        replacement: "$1"
  services:
    fcrepo:
      loadBalancer:
        servers:
          - url: http://fcrepo:8080
  routers:
    fcrepo:
      rule: Host(`fcrepo.{{ env "DOMAIN" }}`)
      middlewares:
        - fcrepo-strip-suffix
      service: fcrepo
      tls: {}
