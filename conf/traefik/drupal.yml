http:
  services:
    drupal:
      loadBalancer:
        servers:
          - url: http://drupal:80
    drupal-static:
      loadBalancer:
        # Served via the captcha-protected parent router, so all traffic to
        # this service is challenged first. The weight-1 drupal backend
        # round-robins ~1% of that captcha-protected traffic to the real
        # drupal container so drupal also gets captcha coverage.
        servers:
          - url: http://drupal-static:80
            weight: 99
          - url: http://drupal:80
            weight: 1
        healthCheck:
            path: /healthcheck
            scheme: http
            interval: 10s
            timeout: 3s
    drupal-lehigh:
      loadBalancer:
        servers:
          - url: http://drupal-lehigh:80
    search:
      loadBalancer:
        servers:
          - url: http://search:8080
        healthCheck:
          path: /healthcheck
          scheme: http
          interval: 10s
          timeout: 3s
  routers:
    # special drupal container reserved for workbench jobs
    # which we have configured to use the internal domain
    drupal-lehigh:
      rule: Host(`{{ env "INTERNAL_DOMAIN" }}`) && !Host(`{{ env "DOMAIN" }}`) && !Path(`/`)
      tls: {}
      priority: 20
      middlewares:
        - drupal-lehigh-host
      service: drupal-lehigh
    # Drupal owns the page shell. Beta search uses AJAX to fetch only result
    # fragments from the Go service.
    search-fragment:
      rule: Method(`GET`) && PathPrefix(`/_go-search/`) && !HeaderRegexp(`Cookie`, `^.*DrupalAuth=1.*$`)
      priority: 16
      parentRefs:
        - captcha-protected
      service: search
    semantic-search:
      rule: Method(`GET`) && Path(`/semantic-search`) && !HeaderRegexp(`Cookie`, `^.*DrupalAuth=1.*$`)
      priority: 16
      parentRefs:
        - captcha-protected
      service: search
    # child: anonymous/static requests served from the nginx static cache.
    # Parent captcha-protected router + captcha-protect middleware now live
    # in captcha-protect.yml (merged via the shared file provider directory).
    drupal-static:
      rule: (Method(`POST`) && Query(`challenge`, `true`)) || (Method(`GET`) && !HeaderRegexp(`Cookie`, `^.*DrupalAuth=1.*$`) && !QueryRegexp(`_format`, `^.*$`))
      priority: 15
      parentRefs:
        - captcha-protected
      service: drupal-static
    # if none of the other rules apply, serve drupal
    drupal:
      rule: Host(`{{ env "DOMAIN" }}`) || Host(`{{ env "INTERNAL_DOMAIN" }}`)
      priority: 10
      parentRefs:
        - captcha-protected
      service: drupal
  middlewares:
    drupal-lehigh-host:
      headers:
        customRequestHeaders:
          Host: '{{ env "DOMAIN" }}'
          X-Forwarded-Host: '{{ env "DOMAIN" }}'
