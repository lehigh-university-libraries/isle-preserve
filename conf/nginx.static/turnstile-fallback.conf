# turnstile-fallback.conf
#
# Last line of defense for clients that slip past the Traefik Turnstile
# challenge but are still abusive (e.g. scrapers spoofing a real browser
# User-Agent). Reach for this file as new bots get past Turnstile.
#
# This fallback defaults to off. To enable it, set $tf_fallback_enabled to 1 in
# static.conf, run nginx -t, then reload nginx.
#
# To block a new offender's facet crawling: add an anchored User-Agent regex to
# the $tf_blocked_ua map below (one line, value 1). When the fallback is
# enabled, the request is blocked only when that User-Agent is off campus and
# the query string contains a Drupal facet array parameter, e.g. f[0]=... or
# f%5B0%5D=...
#
# Requests containing amp%3Bamp%3Bamp%3B are also blocked. Those come from
# crawlers repeatedly URL-encoding links as they crawl facets.
#
# Lehigh's own network (128.180.0.0/16) is exempt from the User-Agent/facet
# crawler heuristic, so on-campus and VPN users are not caught by that rule.
# The malformed amp%3Bamp%3Bamp%3B rule applies to any client.
#
# These are http-context directives (geo/map), so this file auto-loads from
# conf.d/*.conf. The decision variable $turnstile_fallback_block is consumed
# by the server block in static.conf, which returns the styled bot-block.html.

# Real client IP. static.conf trusts the load balancers via set_real_ip_from,
# so after real_ip processing $remote_addr is the client, never the LB.
geo $tf_is_lehigh_client {
    default 0;
    128.180.0.0/16 1;
}

# User-Agent regexes we treat as bots once they are past Turnstile. Use
# anchored regexes instead of long exact map keys so nginx does not need a
# larger map_hash_bucket_size.
map $http_user_agent $tf_blocked_ua {
    default 0;
    "~^Mozilla/5\.0 \(Windows NT 10\.0; Win64; x64\) AppleWebKit/537\.36 \(KHTML, like Gecko\) Chrome/149\.0\.0\.0 Safari/537\.36$" 1;
}

# Drupal facet array parameters. Nginx does not expose args like f[0] as
# convenient variables, so match the raw query string in both decoded and
# URL-encoded forms.
map $args $tf_has_facet_param {
    default 0;
    ~*(^|&)f(\[[^&=]*\]|%5B[^&=]*%5D)= 1;
}

# Repeatedly encoded ampersands from facet crawlers.
map $request_uri $tf_has_overencoded_amp {
    default 0;
    ~*amp%3Bamp%3Bamp%3B 1;
}

# Rule matches when either:
# - the UA matches, the client is off Lehigh's network, and the request
#   includes facet params; or
# - the request has repeatedly encoded ampersands from facet crawling.
map "$tf_blocked_ua:$tf_is_lehigh_client:$tf_has_facet_param:$tf_has_overencoded_amp" $tf_fallback_rule_match {
    default 0;
    ~^1:0:1: 1;
    ~:1$     1;
}

# Only block when the operational switch is enabled and a fallback rule matched.
map "$tf_fallback_enabled:$tf_fallback_rule_match" $turnstile_fallback_block {
    default 0;
    "1:1"   1;
}
