# turnstile-fallback.conf
#
# Last line of defense for clients that slip past the Traefik Turnstile
# challenge but are still abusive (e.g. scrapers spoofing a real browser
# User-Agent). Reach for this file as new bots get past Turnstile.
#
# To block a new offender: add its exact User-Agent string to the
# $tf_blocked_ua map below (one line, value 1).
#
# Lehigh's own network (128.180.0.0/16) is always exempt, so on-campus and
# VPN users are never caught by these heuristics.
#
# These are http-context directives (geo/map), so this file auto-loads from
# conf.d/*.conf. The decision variable $turnstile_fallback_block is consumed
# by the server block in static.conf, which returns the styled bot-block.html.

# Real client IP. static.conf trusts the load balancers via set_real_ip_from,
# so after real_ip processing $remote_addr is the client, never the LB.
geo $tf_is_lehigh_client {
    default 0;
    128.180.0.0/16 1;
}

# Exact User-Agent strings we treat as bots once they are past Turnstile.
# Add new offenders here.
map $http_user_agent $tf_blocked_ua {
    default 0;
    "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/149.0.0.0 Safari/537.36" 1;
}

# Block only when the UA matches AND the client is off Lehigh's network.
map "$tf_blocked_ua:$tf_is_lehigh_client" $turnstile_fallback_block {
    default 0;
    "1:0"   1;
}
